<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body class="mid">
     <img class="bg-image" src="video/Omori background purple - Imgur.gif" alt="Background">
    <header>
       
    <div class="top-bar">
         <h1 class="white">OMORI SHOP</h1>
         <a href="index.html" class="white"><button><b>Home</b></button></a>
         <a href="shop.html" class="white"><button><b>shop</b></button></a>
         <a href="acc.html" class="white"><button><b>Log in</b></button></a>
    </div>
    </header>
<div class="container">
    <div class="form-box active" id="login-form">
        <form action="">
                <h2 class="h">Login</h2>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="login"><b>Login</b></button>
            <p>Don't have an account? <a href="#" onclick="showForms('register-form')">Register</a></p>
        </form>

    </div>
    
</div>
<div class="container">
    <div class="form-box" id="register-form">
        <form action="">
                <h2 class="h">Register</h2>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="">Select Role</option>
                <option value="player">user</option>
                <option value="admin">Admin</option>
            </select>
            <button type="submit" class="login"><b>Register</b></button>
            <p>Already have an account? <a href="#" onclick="showForms('login-form')">Login</a></p>
            
        </form>

    </div>
    
</div>



<script src="index.js"></script>
</body>
</html>
